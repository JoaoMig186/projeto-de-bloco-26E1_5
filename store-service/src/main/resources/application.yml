spring:
  application:
    name: store-service

  datasource:
    url: jdbc:postgresql://postgres:5432/postgres
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

jpa:
  hibernate:
    ddl-auto: update
  show-sql: true
  properties:
    hibernate:
      format_sql: true

server:
  port: 0 # Porta dedicada ao store-service
eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/