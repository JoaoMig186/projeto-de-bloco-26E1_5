spring:
  application:
    name: store-service
  profiles:
    active: prod

logging:
  level:
    root: INFO
    com.infnet: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

management:
  server:
    port: 8083
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics