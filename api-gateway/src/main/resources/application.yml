server:
  port: 9999
spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: lb://USER-SERVICE
              predicates:
                - Path=/users/**
            - id: review-service
              uri: lb://REVIEW-SERVICE
              predicates:
                - Path=/reviews/**
                - Method=GET
            - id: search-service
              uri: lb://SEARCH-SERVICE
              predicates:
                - Path=/icimento/**
eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    instance-id: ${spring.application.name}:${random.value}

security:
  public-key: classpath:keys/public_key.pem

management:
  tracing:
    sampling:
      probability: 1.0

  zipkin:
    tracing:
      endpoint: http://zipkin:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: gateway,health,info