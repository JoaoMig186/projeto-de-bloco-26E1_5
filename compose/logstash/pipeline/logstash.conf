input {
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  mutate {
    add_field => {
      "stack" => "icimento"
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "icimento-logs-%{+YYYY.MM.dd}"
  }

  stdout {
    codec => rubydebug
  }
}