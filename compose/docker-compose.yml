services:
  # EUREKA
  discovery-server:
    build: ../discovery-server
    container_name: discovery-server

    ports:
      - "8761:8761"

    networks:
      - icimento-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # GATEWAY
  api-gateway:
    build: ../api-gateway
    container_name: api-gateway

    ports:
      - "9999:9999"

    networks:
      - icimento-network

    depends_on:
      discovery-server:
        condition: service_healthy

  # USER SERVICE
  user-service:
    build: ../user-service
    container_name: user-service

    networks:
      - icimento-network

    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # GEOCODE-FAKE-SERVICE
  geocode-fake-service:
    build: ../geocode-fake-service
    container_name: geocode-fake-service

    networks:
      - icimento-network

    depends_on:
      discovery-server:
        condition: service_healthy

    # STORE SERVICE
  store-service:
    build: ../store-service
    container_name: store-service

    networks:
      - icimento-network

    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # REVIEW SERVICE
  review-service:
    build: ../review-service
    container_name: review-service

    networks:
      - icimento-network

    depends_on:
      discovery-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
  # CAR SERVICE
  cart-service:
    build: ../car-service
    container_name: car-service

    networks:
      - icimento-network

    depends_on:
      discovery-server:
        condition: service_healthy

      postgres:
        condition: service_healthy

      kafka:
        condition: service_healthy
  #DELIVERY SERVICE
  delivery-service:
    build: ../delivery-service
    container_name: delivery-service

    networks:
      - icimento-network

    depends_on:
      discovery-server:
        condition: service_healthy

      postgres:
        condition: service_healthy

      kafka:
        condition: service_healthy
  # POSTGRES
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ./postgres/init:/docker-entrypoint-initdb.d
      - icimento-postgres-data:/var/lib/postgresql/data
    networks:
      - icimento-network

    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
  # KAFKA
  kafka:
    image: apache/kafka:4.1.0
    container_name: icimento-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller

      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

    healthcheck:
      test: [ "CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1" ]
      interval: 10s
      timeout: 10s
      retries: 10
    volumes:
      - icimento-kafka-data:/var/lib/kafka/data
    networks:
      - icimento-network

  kafka-ui:
      image: provectuslabs/kafka-ui:latest
      container_name: icimento-kafka-ui
      depends_on:
        kafka:
          condition: service_healthy
      ports:
        - "8085:8080"
      environment:
        KAFKA_CLUSTERS_0_NAME: icimento-local
        KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      networks:
        - icimento-network

  # PROMETHEUS
  prometheus:
    image: prom/prometheus:latest
    container_name: icimento-prometheus
    ports:
      - "9090:9090"
    volumes:
      - icimento-prometheus-data:/prometheus
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    networks:
      - icimento-network

  grafana:
    image: grafana/grafana:latest
    container_name: icimento-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - icimento-grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - icimento-network


volumes:
  icimento-postgres-data:
  icimento-kafka-data:
  icimento-prometheus-data:
  icimento-grafana-data:

networks:
  icimento-network:
