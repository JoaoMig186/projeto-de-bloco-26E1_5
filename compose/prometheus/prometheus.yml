global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: "delivery-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "delivery-service:8082"
  - job_name: "user-service"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - "user-service:8081"
  - job_name: "car-service"
    metrics_path: /actuator/prometheus
    static_configs:
        - targets:
            - "car-service:8086"